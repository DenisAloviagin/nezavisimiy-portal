services:
  - type: cron
    name: nezavisimiy-portal-digest
    env: python
    schedule: "0 9 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
